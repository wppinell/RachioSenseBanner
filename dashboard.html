<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>RachioSense</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#080a10;
    --glass:rgba(8,10,16,0.72);
    --glass-heavy:rgba(8,10,16,0.88);
    --border:rgba(255,255,255,0.06);
    --text:#f0f2f5;
    --text-sec:#9ba0b4;
    --text-dim:#555970;
    --accent:#4fc3f7;
    --green:#66bb6a;
    --yellow:#ffca28;
    --red:#ef5350;
    --blue:#42a5f5;
    --teal:#26a69a;
    --gauge-track:rgba(255,255,255,0.10);
  }

  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    width:1920px;height:1200px;
    overflow:hidden;
    display:flex;flex-direction:column;
  }

  /* ── Header ── */
  .hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;height:44px;flex-shrink:0;
    background:rgba(12,14,22,0.95);border-bottom:1px solid var(--border);
  }
  .hdr-l{display:flex;align-items:center;gap:18px}
  .logo{font-size:16px;font-weight:800;color:var(--accent)}
  .logo span{color:var(--green)}
  .hdr-w{display:flex;gap:16px;font-size:12px;color:var(--text-sec)}
  .hdr-w .big{font-size:16px;font-weight:700;color:var(--text)}
  .hdr-r{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text-sec)}
  .hdr-r .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:3px}
  .hdr-r .dot.offline{background:#666}
  .clk{font-size:14px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}

  /* ── Grid: 4×2, last slot is alerts ── */
  .grid{
    flex:1;display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:1fr 1fr;
    gap:8px;padding:8px;
    opacity:1;
    transition:opacity 0.6s ease;
  }
  .grid.fading{opacity:0.7}

  /* ── Zone Tile ── */
  .tile{
    border-radius:16px;overflow:hidden;
    position:relative;border:1px solid var(--border);
  }
  .tile-bg{position:absolute;inset:0;background-size:cover;background-position:center}
  .tile-ov{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 55%, rgba(8,10,16,0.55) 0%, rgba(8,10,16,0.78) 100%);
  }
  .tile-c{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;
    height:100%;padding:14px 18px;
  }

  /* Zone name top-left */
  .zname{
    font-size:26px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.8px;
    text-shadow:0 2px 16px rgba(0,0,0,0.9);
  }

  /* Gauge: centered, large */
  .tile-mid{
    flex:1;display:flex;
    align-items:center;justify-content:center;
    gap:20px;
  }
  .g-wrap{position:relative;flex-shrink:0}
  .g-wrap svg{transform:rotate(-90deg)}
  .g-wrap .trk{fill:none;stroke:var(--gauge-track)}
  .g-wrap .fl{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
  .g-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .g-val{font-weight:900;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 2px 20px rgba(0,0,0,0.6)}
  .g-sub{font-size:10px;color:var(--text-sec);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

  /* Runtime rings — flanking the main gauge */
  .ring-col{display:flex;flex-direction:column;gap:10px;align-items:center}
  .r-wrap{position:relative}
  .r-wrap svg{transform:rotate(-90deg)}
  .r-wrap .trk{fill:none;stroke:var(--gauge-track)}
  .r-wrap .fl{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
  .r-wrap .fl.day{stroke:var(--teal)}
  .r-wrap .fl.wk{stroke:var(--accent)}
  .r-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .r-val{font-weight:700;line-height:1}
  .r-unit{font-size:13px;color:var(--text-sec);margin-top:3px;letter-spacing:0.5px}

  /* Bottom section */
  .tile-bot{
    display:flex;flex-direction:column;gap:8px;
    align-items:center;width:100%;
  }
  .ring-row{
    display:flex;gap:24px;align-items:flex-start;
    justify-content:center;width:100%;
  }
  .sensor-row{
    display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
  }
  .sc{
    display:flex;align-items:center;gap:3px;
    padding:3px 8px;border-radius:8px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(6px);
    font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;
  }
  .sd{width:6px;height:6px;border-radius:50%}

  /* ── Alerts Panel ── */
  .alerts-panel{
    border-radius:16px;overflow:hidden;
    border:1px solid var(--border);
    position:relative;
  }
  .wx-tile{color:#fff;}
  .sky-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:26px 28px}
  .wx-top{display:flex;flex-direction:column;gap:3px}
  .wx-date-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:0.65}
  .wx-desc-label{font-size:17px;font-weight:500;opacity:0.9;text-transform:capitalize}
  .wx-big-temp{font-size:110px;font-weight:900;line-height:1;letter-spacing:-5px;text-shadow:0 4px 32px rgba(0,0,0,0.35)}
  .wx-deg{font-size:46px;font-weight:300;vertical-align:super;letter-spacing:0}
  .wx-hilo{display:flex;gap:20px;font-size:24px;font-weight:700;margin-bottom:12px}
  .wx-hi{color:rgba(255,210,140,1)}
  .wx-lo{color:rgba(200,235,255,1)}
  .wx-stats{display:flex;align-items:center;gap:0;background:rgba(0,0,0,0.28);backdrop-filter:blur(6px);border-radius:14px;padding:12px 0;margin-bottom:4px}
  .wx-stat{flex:1;text-align:center}
  .wx-stat-val{font-size:26px;font-weight:800}
  .wx-stat-lbl{font-size:10px;font-weight:600;opacity:0.6;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .wx-stat-div{width:1px;background:rgba(255,255,255,0.18);align-self:stretch}
  .ap-title{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px}
  .al{
    display:flex;align-items:flex-start;gap:8px;
    padding:8px 12px;border-radius:10px;
    font-size:13px;font-weight:500;line-height:1.4;
  }
  .al .al-icon{flex-shrink:0;font-size:14px;margin-top:1px}
  .al.ok{background:rgba(102,187,106,0.08);color:var(--green)}
  .al.crit{background:rgba(239,83,80,0.08);color:var(--red)}
  .al.warn{background:rgba(255,202,40,0.08);color:var(--yellow)}
  .al.info{background:rgba(79,195,247,0.08);color:var(--accent)}

  /* Forecast in alerts */
  .fc{display:flex;gap:5px;margin-top:2px}
  .fcd{
    flex:1;text-align:center;padding:6px 3px;
    background:rgba(255,255,255,0.04);border-radius:8px;
  }
  .fcd .fl{font-size:10px;font-weight:700;color:var(--text-dim)}
  .fcd .fi{font-size:18px;margin:2px 0}
  .fcd .ft{font-size:11px;color:var(--text-sec)}
  .fcd .fh{color:var(--text);font-weight:700}

  /* Services */
  .svc{display:flex;align-items:center;gap:10px;font-size:12px}
  .svc-i{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .svc-n{font-weight:600;font-size:12px}
  .svc-d{font-size:10px;color:var(--text-sec)}

  .ap-updated{margin-top:auto;text-align:center;font-size:10px;color:var(--text-dim)}
  .ap-updated.offline{color:var(--red)}

  /* Loading state */
  .loading-state{
    display:flex;align-items:center;justify-content:center;
    height:100%;font-size:16px;color:var(--text-sec);
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo">Rachio<span>Sense</span></div>
    <div class="hdr-w">
      <span class="big" id="temp">☀️ --°F</span>
      <span id="humidity">💧 --%</span>
      <span id="wind">💨 -- mph</span>
    </div>
  </div>
  <div class="hdr-r">
    <span id="svc-sensecraft"><span class="dot"></span>SenseCraft</span>
    <span id="svc-rachio"><span class="dot"></span>Rachio --</span>
    <span class="clk" id="clk"></span>
  </div>
</div>

<div class="grid" id="g">
  <div class="loading-state">Loading dashboard...</div>
</div>

<script>
const MX_1D = 90;   // 90 min = full 1-day ring
const MX_7D = 420;  // 7 hours = full 7-day ring
const ZONE_ICONS = {
  'lawn': '🌿', 'grass': '🌿', 'front': '🌿',
  'citrus': '🍊', 'orange': '🍊', 'lemon': '🍋',
  'rose': '🌹', 'flower': '🌸',
  'ficus': '🌳', 'tree': '🌳', 'oak': '🌳',
  'tomato': '🍅',
  'herb': '🌿', 'basil': '🌿',
  'lettuce': '🥬', 'salad': '🥬', 'vegetable': '🥬',
  'garden': '🌱', 'bed': '🌱',
};

function zoneIcon(name) {
  const lower = name.toLowerCase();
  for (const [key, icon] of Object.entries(ZONE_ICONS)) {
    if (lower.includes(key)) return icon;
  }
  return '🌱';
}

function mc(p) {
  if (p === null || p === undefined) return '#888';
  return p < 20 ? '#ef5350' : p < 25 ? '#ffca28' : p > 40 ? '#42a5f5' : '#66bb6a';
}

function arc(p, r) {
  const c = 2 * Math.PI * r;
  return { c, o: c - (Math.min(p, 100) / 100) * c };
}

function fm(m) {
  return !m ? '0m' : m < 60 ? m + 'm' : (m % 60 === 0 ? (m / 60) + 'h' : (m / 60).toFixed(1) + 'h');
}

// Main moisture gauge — BIG
function gaugeSVG(pct, color, sz) {
  const displayPct = pct === null || pct === undefined ? 0 : pct;
  const displayText = pct === null || pct === undefined ? '--' : displayPct.toFixed(1);
  const R = sz * 0.42, SW = sz * 0.06, { c, o } = arc(displayPct, R);
  const cx = sz / 2, cy = sz / 2;
  return `<div class="g-wrap" style="width:${sz}px;height:${sz}px">
    <svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
      <circle class="trk" cx="${cx}" cy="${cy}" r="${R}" stroke-width="${SW}"/>
      <circle class="fl" cx="${cx}" cy="${cy}" r="${R}" stroke="${color}" stroke-width="${SW}"
        stroke-dasharray="${c}" stroke-dashoffset="${o}"/>
    </svg>
    <div class="g-ctr">
      <div class="g-val" style="color:${color};font-size:${sz * 0.22}px">${displayText}<span style="font-size:${sz * 0.12}px;font-weight:400">${pct === null ? '' : '%'}</span></div>
    </div>
  </div>`;
}

// Runtime ring
function ringSVG(pct, val, cls, sz) {
  const R = sz * 0.38, SW = sz * 0.09, { c, o } = arc(pct, R);
  const cx = sz / 2, cy = sz / 2;
  const parts = val.split('/');
  const num = parts[0], unit = parts[1] ? '/' + parts[1] : '';
  return `<div class="r-wrap" style="width:${sz}px;height:${sz}px">
    <svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
      <circle class="trk" cx="${cx}" cy="${cy}" r="${R}" stroke-width="${SW}"/>
      <circle class="fl ${cls}" cx="${cx}" cy="${cy}" r="${R}" stroke-width="${SW}"
        stroke-dasharray="${c}" stroke-dashoffset="${o}"/>
    </svg>
    <div class="r-ctr">
      <div class="r-val" style="font-size:${sz * 0.24}px">${num}</div>
      <div class="r-unit">${unit}</div>
    </div>
  </div>`;
}

function tile(z) {
  const moisture = z.moisture;
  const color = mc(moisture);
  const p1 = Math.min((z.runtime1d || 0) / MX_1D * 100, 100);
  const p7 = Math.min((z.runtime7d || 0) / MX_7D * 100, 100);
  const sensors = z.sensors || [];
  const icon = zoneIcon(z.name);

  return `<div class="tile">
    <div class="tile-bg" style="background-image:url('${z.imageUrl || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'}')"></div>
    <div class="tile-ov"></div>
    <div class="tile-c">
      <div class="zname">${icon} ${z.name}</div>
      <div class="tile-mid">
        ${gaugeSVG(moisture, color, 260)}
      </div>
      <div class="tile-bot">
        <div class="ring-row">
          ${ringSVG(p1, fm(z.runtime1d) + '/day', 'day', 140)}
          ${ringSVG(p7, fm(z.runtime7d) + '/wk', 'wk', 140)}
        </div>
        <div class="sensor-row">
          ${sensors.map(s => `<div class="sc"><div class="sd" style="background:${s.color || '#888'}"></div>${s.id} ${s.moisture !== null ? s.moisture.toFixed(0) : '--'}%</div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function wxSkyLayers(desc, temp) {
  const d = (desc || '').toLowerCase();
  const hr = new Date().getHours();
  const isSunset = hr >= 17 && hr <= 20;
  const isNight  = hr < 6 || hr >= 21;

  if (d.includes('thunder') || d.includes('storm')) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0a0c14 0%,#111824 20%,#1a2438 45%,#243048 70%,#2e3c58 100%)"></div>
    <svg style="position:absolute;top:0;left:0;width:100%;height:65%;" viewBox="0 0 290 200" preserveAspectRatio="xMidYMid slice">
      <filter id="cb"><feGaussianBlur stdDeviation="6"/></filter>
      <ellipse cx="145" cy="80"  rx="175" ry="80"  fill="rgba(20,28,46,0.95)"  filter="url(#cb)"/>
      <ellipse cx="50"  cy="60"  rx="110" ry="65"  fill="rgba(15,22,40,0.98)"  filter="url(#cb)"/>
      <ellipse cx="240" cy="65"  rx="100" ry="60"  fill="rgba(18,25,43,0.95)"  filter="url(#cb)"/>
      <ellipse cx="145" cy="110" rx="170" ry="55"  fill="rgba(25,35,55,0.88)"  filter="url(#cb)"/>
    </svg>
    <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.5" viewBox="0 0 290 420">
      <g stroke="rgba(160,195,230,0.65)" stroke-width="1" stroke-linecap="round">
        ${[20,55,90,125,160,195,230,265,38,73,108,143,178,213,248,10,45,80,115,150,185,220,255,280].map((x,i)=>`<line x1="${x}" y1="${110+i*12}" x2="${x-5}" y2="${160+i*12}"/>`).join('')}
      </g>
    </svg>`;

  if (d.includes('rain') || d.includes('shower') || d.includes('drizzle')) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0e1520 0%,#1c2a3e 30%,#2a3a50 60%,#384858 100%)"></div>
    <svg style="position:absolute;top:0;left:0;width:100%;height:65%;" viewBox="0 0 290 200" preserveAspectRatio="xMidYMid slice">
      <filter id="rb"><feGaussianBlur stdDeviation="5"/></filter>
      <ellipse cx="145" cy="75"  rx="170" ry="75"  fill="rgba(28,40,60,0.92)"  filter="url(#rb)"/>
      <ellipse cx="55"  cy="58"  rx="105" ry="62"  fill="rgba(22,34,54,0.95)"  filter="url(#rb)"/>
      <ellipse cx="235" cy="62"  rx="95"  ry="58"  fill="rgba(25,37,57,0.92)"  filter="url(#rb)"/>
    </svg>
    <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.55" viewBox="0 0 290 420">
      <g stroke="rgba(180,210,240,0.7)" stroke-width="1" stroke-linecap="round">
        ${[15,45,75,105,135,165,195,225,255,280,30,60,90,120,150,180,210,240,270,10,50,85,115,145,175,205,235,265].map((x,i)=>`<line x1="${x}" y1="${100+i*11}" x2="${x-6}" y2="${155+i*11}"/>`).join('')}
      </g>
    </svg>`;

  if (d.includes('fog') || d.includes('mist') || d.includes('haze')) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#3a4452 0%,#4e5c68 30%,#687880 60%,#8a9aa4 100%)"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 120% 60% at 50% 60%,rgba(200,215,225,0.45) 0%,transparent 70%)"></div>
    <div style="position:absolute;top:20%;left:0;right:0;height:40%;background:linear-gradient(0deg,transparent,rgba(210,222,230,0.3),transparent)"></div>`;

  if (d.includes('overcast') || d.includes('cloud') && !d.includes('partly') && !d.includes('mainly')) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#2c3444 0%,#3d4b5c 20%,#506070 45%,#6a7e8c 70%,#8898a6 90%,#a0b0bc 100%)"></div>
    <svg style="position:absolute;top:0;left:0;width:100%;height:75%;" viewBox="0 0 290 230" preserveAspectRatio="xMidYMid slice">
      <filter id="ob"><feGaussianBlur stdDeviation="5"/></filter>
      <ellipse cx="145" cy="85"  rx="175" ry="80"  fill="rgba(95,115,135,0.65)"  filter="url(#ob)"/>
      <ellipse cx="55"  cy="65"  rx="108" ry="65"  fill="rgba(82,102,122,0.72)"  filter="url(#ob)"/>
      <ellipse cx="235" cy="72"  rx="98"  ry="60"  fill="rgba(88,108,128,0.68)"  filter="url(#ob)"/>
      <ellipse cx="145" cy="115" rx="168" ry="58"  fill="rgba(108,128,145,0.58)" filter="url(#ob)"/>
      <ellipse cx="145" cy="35"  rx="180" ry="52"  fill="rgba(130,150,165,0.38)" filter="url(#ob)"/>
    </svg>`;

  if (isSunset) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0d0820 0%,#1a0a38 12%,#3d0f52 24%,#7b1d6b 36%,#c0374a 48%,#e8633a 60%,#f4903a 72%,#f7b84a 82%,#fad87a 91%,#fdeea8 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:45%;background:radial-gradient(ellipse 90% 65% at 50% 100%,rgba(255,200,80,0.55) 0%,transparent 70%)"></div>
    <svg style="position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:80px;height:80px" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="38" fill="rgba(255,230,100,0.07)"/>
      <circle cx="40" cy="40" r="28" fill="rgba(255,215,70,0.15)"/>
      <circle cx="40" cy="40" r="18" fill="rgba(255,205,50,0.35)"/>
      <circle cx="40" cy="40" r="12" fill="rgba(255,230,100,0.88)"/>
      <circle cx="40" cy="40" r="8"  fill="#fff5c0"/>
    </svg>
    <svg style="position:absolute;bottom:26%;left:0;width:100%;height:55px" viewBox="0 0 290 55" preserveAspectRatio="none">
      <path d="M0,42 Q25,38 45,40 L45,28 L48,28 L48,18 L51,18 L51,10 L54,10 L54,18 L57,18 L57,28 L60,28 L60,40 Q90,37 120,40 L120,30 L123,30 L123,22 L126,22 L126,16 L129,16 L129,22 L132,22 L132,30 L135,30 L135,40 Q165,38 195,40 L195,26 L199,26 L199,14 L203,14 L203,6 L207,6 L207,14 L211,14 L211,26 L215,26 L215,40 Q245,38 270,40 L270,32 L273,32 L273,24 L276,24 L276,18 L279,18 L279,24 L282,24 L282,32 L285,32 L285,40 Q288,39 290,40 L290,55 L0,55 Z" fill="rgba(5,3,15,0.78)"/>
    </svg>
    <div style="position:absolute;bottom:0;left:0;right:0;height:26%;background:linear-gradient(0deg,rgba(5,3,15,0.92) 0%,rgba(5,3,15,0.55) 55%,transparent 100%)"></div>`;

  if (isNight) return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#020408 0%,#040810 15%,#060c18 35%,#0a1428 60%,#0e1c38 80%,#122448 100%)"></div>
    <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 290 420">
      ${Array.from({length:55},(_,i)=>{const x=Math.sin(i*127.3)*145+145,y=Math.cos(i*98.7)*200+130,r=Math.random()<0.15?1.2:0.7,op=0.4+Math.random()*0.55;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="rgba(255,255,255,${op.toFixed(2)})"/>`}).join('')}
    </svg>
    <svg style="position:absolute;top:12%;right:16%;width:65px;height:65px" viewBox="0 0 65 65">
      <circle cx="32" cy="32" r="30" fill="rgba(200,220,255,0.08)"/>
      <circle cx="32" cy="32" r="22" fill="rgba(210,228,255,0.14)"/>
      <circle cx="32" cy="32" r="15" fill="rgba(230,240,255,0.82)"/>
      <circle cx="38" cy="26" r="9"  fill="rgba(15,20,40,0.72)"/>
    </svg>`;

  // Default: clear sunny
  return `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0b2d5c 0%,#0d3f7a 10%,#1565c0 28%,#1e88e5 46%,#42a5f5 63%,#81d4fa 78%,#b3e5fc 90%,#e1f5fe 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(0deg,rgba(200,235,255,0.32) 0%,transparent 100%)"></div>
    <svg style="position:absolute;top:16%;right:12%;width:130px;height:130px" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="62" fill="rgba(255,255,200,0.04)"/>
      <circle cx="65" cy="65" r="52" fill="rgba(255,255,180,0.07)"/>
      <circle cx="65" cy="65" r="42" fill="rgba(255,248,140,0.11)"/>
      <circle cx="65" cy="65" r="32" fill="rgba(255,240,100,0.18)"/>
      <circle cx="65" cy="65" r="22" fill="rgba(255,235,80,0.32)"/>
      <circle cx="65" cy="65" r="16" fill="rgba(255,252,200,0.94)"/>
      <circle cx="65" cy="65" r="11" fill="#fffde0"/>
    </svg>
    <div style="position:absolute;top:30%;right:10%;width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);transform:rotate(-12deg)"></div>`;
}

function wxPartlyCloudySVG() {
  return `
    <svg style="position:absolute;top:24%;left:-2%;width:62%;opacity:0.95" viewBox="0 0 220 80">
      <ellipse cx="110" cy="56" rx="108" ry="27" fill="rgba(255,255,255,0.90)"/>
      <ellipse cx="72"  cy="44" rx="54"  ry="34" fill="rgba(255,255,255,0.94)"/>
      <ellipse cx="142" cy="46" rx="48"  ry="30" fill="rgba(255,255,255,0.89)"/>
      <ellipse cx="110" cy="40" rx="40"  ry="27" fill="#ffffff"/>
      <ellipse cx="110" cy="64" rx="105" ry="11" fill="rgba(155,178,210,0.32)"/>
    </svg>
    <svg style="position:absolute;top:40%;right:0%;width:46%;opacity:0.86" viewBox="0 0 155 58">
      <ellipse cx="78" cy="42" rx="76" ry="19" fill="rgba(242,250,255,0.86)"/>
      <ellipse cx="52" cy="32" rx="37"  ry="24" fill="rgba(250,254,255,0.92)"/>
      <ellipse cx="104" cy="34" rx="33" ry="22" fill="rgba(248,253,255,0.88)"/>
      <ellipse cx="78"  cy="29" rx="28" ry="19" fill="#f5f9ff"/>
      <ellipse cx="78"  cy="48" rx="74" ry="9"  fill="rgba(155,182,210,0.26)"/>
    </svg>`;
}

function alertsPanel(data) {
  const w = data.weather || {};
  const cur = w.current || {};
  const today = (w.forecast || [])[0] || {};
  const updatedTime = formatUpdatedTime(data.updatedAt);
  const temp    = cur.temp     !== undefined ? cur.temp     : '--';
  const hi      = today.high   !== undefined ? today.high   : '--';
  const lo      = today.low    !== undefined ? today.low    : '--';
  const desc    = cur.description || '';
  const humidity= cur.humidity !== undefined ? cur.humidity : '--';
  const wind    = cur.wind     !== undefined ? cur.wind     : '--';
  const d       = desc.toLowerCase();
  const isPartly= d.includes('partly') || d.includes('mainly clear') || d.includes('mostly clear');

  return `<div class="alerts-panel wx-tile">
    ${wxSkyLayers(desc, cur.temp)}
    ${isPartly ? wxPartlyCloudySVG() : ''}
    <div class="sky-ov">
      <div class="wx-top">
        <div class="wx-date-label">Today · Phoenix</div>
        <div class="wx-desc-label">${desc}</div>
      </div>
      <div>
        <span class="wx-big-temp">${temp}</span><span class="wx-deg">°</span>
      </div>
      <div>
        <div class="wx-hilo"><span class="wx-hi">▲ ${hi}°</span><span class="wx-lo">▼ ${lo}°</span></div>
        <div class="wx-stats">
          <div class="wx-stat"><div class="wx-stat-val">${humidity}%</div><div class="wx-stat-lbl">Humidity</div></div>
          <div class="wx-stat-div"></div>
          <div class="wx-stat"><div class="wx-stat-val">${wind}</div><div class="wx-stat-lbl">mph Wind</div></div>
        </div>
        <div class="ap-updated" id="upd" style="color:rgba(255,255,255,0.45)">${updatedTime}</div>
      </div>
    </div>
  </div>`;
}

function formatUpdatedTime(isoString) {
  if (!isoString) return 'Updated just now';
  try {
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now - date;
    const diffSecs = Math.floor(diffMs / 1000);
    const diffMins = Math.floor(diffSecs / 60);
    const diffHours = Math.floor(diffMins / 60);

    if (diffSecs < 60) return 'Updated just now';
    if (diffMins < 60) return `Updated ${diffMins}m ago`;
    if (diffHours < 24) return `Updated ${diffHours}h ago`;
    return `Updated ${Math.floor(diffHours / 24)}d ago`;
  } catch (e) {
    return 'Updated just now';
  }
}

function updateHeader(data) {
  const weather = data.weather || {};
  const current = weather.current || {};
  const services = data.services || {};

  const temp = current.temp || '--';
  const icon = current.icon || '❓';
  document.getElementById('temp').textContent = `${icon} ${temp}°F`;

  const humidity = current.humidity || '--';
  document.getElementById('humidity').textContent = `💧 ${humidity}%`;

  const wind = current.wind || '--';
  document.getElementById('wind').textContent = `💨 ${wind} mph`;

  const sensecraft = services.sensecraft || {};
  const sensecraftDot = sensecraft.connected ? 'dot' : 'dot offline';
  document.getElementById('svc-sensecraft').innerHTML = `<span class="${sensecraftDot}"></span>SenseCraft`;

  const rachio = services.rachio || {};
  const rachioDot = rachio.connected ? 'dot' : 'dot offline';
  const rachioCounts = rachio.apiRemaining !== undefined ? rachio.apiRemaining : '--';
  document.getElementById('svc-rachio').innerHTML = `<span class="${rachioDot}"></span>Rachio ${rachioCounts}`;
}

function renderDashboard(data) {
  const grid = document.getElementById('g');
  const zones = (data.zones || []).slice().sort((a, b) => {
    if (a.moisture === null && b.moisture === null) return 0;
    if (a.moisture === null) return 1;
    if (b.moisture === null) return -1;
    return a.moisture - b.moisture;
  });
  const tilesHtml = zones.map(tile).join('');
  const panelHtml = alertsPanel(data);

  grid.classList.add('fading');
  setTimeout(() => {
    grid.innerHTML = tilesHtml + panelHtml;
    grid.classList.remove('fading');
  }, 300);

  updateHeader(data);
}

let lastData = null;

async function fetchAndRender() {
  try {
    const response = await fetch('/api/data');
    if (!response.ok) throw new Error('Failed to fetch');
    const data = await response.json();
    lastData = data;
    renderDashboard(data);

    // Update "offline" indicator
    const updEl = document.getElementById('upd');
    if (updEl) updEl.classList.remove('offline');
  } catch (error) {
    console.error('Error fetching data:', error);

    // Show error state if we have lastData
    if (lastData) {
      const grid = document.getElementById('g');
      const updEl = document.getElementById('upd');
      if (updEl) {
        updEl.classList.add('offline');
        updEl.textContent = 'Connection lost';
      }
    } else {
      document.getElementById('g').innerHTML = '<div class="loading-state">Failed to load dashboard. Is the API running at /api/data?</div>';
    }
  }
}

// Initial load
fetchAndRender();

// Auto-refresh every 30 seconds
setInterval(fetchAndRender, 30000);

// Clock updates every 1 second independently
!function t() {
  document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  setTimeout(t, 1e3);
}();
</script>
